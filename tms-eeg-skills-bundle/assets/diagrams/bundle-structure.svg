<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">TMS-EEG Skills Bundle Structure</title>
  <desc id="desc">Block diagram showing the TMS-EEG skills bundle with experiment planning and preprocessing consultant sub-skills.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.4; rx: 10; }
      .bundle { fill: #e0f2fe; stroke: #075985; stroke-width: 1.8; rx: 12; }
      .planner { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 10; }
      .prep { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 10; }
      .shared { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 1.3; rx: 9; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .text { font: 400 13px Arial, sans-serif; fill: #374151; }
      .small { font: 400 12px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #374151; stroke-width: 1.7; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="820"/>
  <text class="title" x="60" y="58">TMS-EEG Skills Bundle</text>
  <text class="subtitle" x="60" y="84">One methodological bundle, two separately routed expert sub-skills.</text>

  <rect class="bundle" x="60" y="120" width="1080" height="650"/>
  <text class="label" x="88" y="154">tms-eeg-skills-bundle/</text>
  <text class="small" x="88" y="176">Bundle README, shared article schemes, and future TMS-EEG sub-skills.</text>

  <rect class="planner" x="100" y="220" width="470" height="420"/>
  <text class="label" x="128" y="254">tms-eeg-experiment-planner/</text>
  <text class="text" x="128" y="282">Before data collection</text>
  <text class="small" x="128" y="312">• target choice and target-specific risk</text>
  <text class="small" x="128" y="336">• coil orientation, intensity, RMT vs TEP threshold</text>
  <text class="small" x="128" y="360">• sham, masking, sensory controls</text>
  <text class="small" x="128" y="384">• rt-TEP monitoring and online QC</text>
  <text class="small" x="128" y="408">• neuronavigation, SimNIBS, SlicerTMS, NaviNIBS</text>
  <text class="small" x="128" y="432">• channel/lead preparation and artifact appearance</text>
  <text class="small" x="128" y="456">• session checklists and methods templates</text>

  <rect class="prep" x="630" y="220" width="470" height="420"/>
  <text class="label" x="658" y="254">tms-eeg-preprocessing-consultant/</text>
  <text class="text" x="658" y="282">After data collection</text>
  <text class="small" x="658" y="312">• preprocessing pipeline selection</text>
  <text class="small" x="658" y="336">• TMS pulse, decay, muscle, sensory artifact handling</text>
  <text class="small" x="658" y="360">• Python/MNE and MATLAB/EEGLAB/TESA recipes</text>
  <text class="small" x="658" y="384">• SOUND, SSP-SIR, ICA, ARTIST/AARATEP</text>
  <text class="small" x="658" y="408">• TEPs, GMFA, LMFP, i-TEP early windows</text>
  <text class="small" x="658" y="432">• PyTepFit downstream modeling branch</text>
  <text class="small" x="658" y="456">• QC reports, caveats, and code-generation policy</text>

  <rect class="shared" x="230" y="675" width="740" height="72"/>
  <text class="label" x="260" y="704">Shared Design Logic</text>
  <text class="small" x="260" y="728">Compact cards distill raw articles, repos, and notes; Context7/GitHub handle changing software APIs.</text>

  <path class="arrow" d="M570 430 C595 430, 605 430, 630 430"/>
  <text class="small" x="492" y="410">acquisition metadata</text>
  <text class="small" x="502" y="456">artifact risks</text>
</svg>
