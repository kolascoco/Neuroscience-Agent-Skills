<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">TMS-EEG Bundle Runtime Block Logic</title>
  <desc id="desc">Runtime decision logic for routing user requests between the experiment planner and preprocessing consultant.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.4; rx: 10; }
      .decision { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.5; }
      .planner { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; rx: 10; }
      .prep { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 10; }
      .output { fill: #fef9c3; stroke: #a16207; stroke-width: 1.4; rx: 10; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .text { font: 400 12px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #374151; stroke-width: 1.6; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="820"/>
  <text class="title" x="60" y="55">Runtime Block Logic</text>

  <rect class="box" x="450" y="90" width="300" height="70"/>
  <text class="label" x="512" y="122">User Question</text>
  <text class="text" x="512" y="144">goal, stage, data status, output mode</text>

  <polygon class="decision" points="600,205 760,285 600,365 440,285"/>
  <text class="label" x="526" y="274">Which stage?</text>
  <text class="text" x="505" y="298">before or after acquisition</text>

  <rect class="planner" x="95" y="430" width="330" height="90"/>
  <text class="label" x="124" y="462">Experiment Planner</text>
  <text class="text" x="124" y="486">targeting, stimulation, controls,</text>
  <text class="text" x="124" y="504">online QC, session checklist</text>

  <rect class="prep" x="775" y="430" width="330" height="90"/>
  <text class="label" x="804" y="462">Preprocessing Consultant</text>
  <text class="text" x="804" y="486">pipeline, artifact cleaning, TEPs,</text>
  <text class="text" x="804" y="504">GMFA/LMFP, i-TEPs, code</text>

  <rect class="box" x="95" y="570" width="330" height="84"/>
  <text class="label" x="124" y="602">Load Planning Cards</text>
  <text class="text" x="124" y="624">design, target-risk, artifacts, repos,</text>
  <text class="text" x="124" y="642">good-practice, templates</text>

  <rect class="box" x="775" y="570" width="330" height="84"/>
  <text class="label" x="804" y="602">Load Processing Cards</text>
  <text class="text" x="804" y="624">pipelines, steps, artifacts, repos,</text>
  <text class="text" x="804" y="642">papers, recipes</text>

  <rect class="decision" x="455" y="450" width="290" height="90"/>
  <text class="label" x="486" y="482">Shared Questions</text>
  <text class="text" x="486" y="504">i-TEP, artifact appearance,</text>
  <text class="text" x="486" y="522">SimNIBS, sensory controls</text>

  <rect class="output" x="330" y="705" width="540" height="70"/>
  <text class="label" x="458" y="736">Answer With Guardrails</text>
  <text class="text" x="458" y="758">actionable plan/code plus QC, assumptions, caveats, and source-grounded limits</text>

  <path class="arrow" d="M600 160 L600 205"/>
  <path class="arrow" d="M440 285 C300 310, 250 380, 260 430"/>
  <path class="arrow" d="M760 285 C900 310, 950 380, 940 430"/>
  <path class="arrow" d="M600 365 L600 450"/>
  <path class="arrow" d="M260 520 L260 570"/>
  <path class="arrow" d="M940 520 L940 570"/>
  <path class="arrow" d="M425 612 C500 650, 535 680, 570 705"/>
  <path class="arrow" d="M775 612 C700 650, 665 680, 630 705"/>
  <path class="arrow" d="M600 540 L600 705"/>
</svg>
