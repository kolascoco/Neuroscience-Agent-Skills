<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">TMS-EEG Bundle Lifecycle Routing Logic</title>
  <desc id="desc">The bundle is organized around the study lifecycle, routing queries to the experiment planner before acquisition and to the preprocessing consultant after acquisition.</desc>

  <defs>
    <style>
      .bg        { fill: #f8fafc; }
      .title     { font: 700 26px Arial, sans-serif; fill: #111827; }
      .subtitle  { font: 400 14px Arial, sans-serif; fill: #6b7280; }
      .phase-box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.2; rx: 8; }
      .planner   { fill: #ecfdf5; stroke: #047857; stroke-width: 1.8; }
      .prep      { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.8; }
      .acq-box   { fill: #f0f9ff; stroke: #0369a1; stroke-width: 1.4; }
      .warn-box  { fill: #fef9c3; stroke: #a16207; stroke-width: 1.3; }
      .label     { font: 700 14px Arial, sans-serif; fill: #111827; }
      .label-lg  { font: 700 16px Arial, sans-serif; fill: #111827; }
      .sublabel  { font: 700 12px Arial, sans-serif; fill: #374151; }
      .text      { font: 400 12px Arial, sans-serif; fill: #4b5563; }
      .text-sm   { font: 400 11px Arial, sans-serif; fill: #6b7280; }
      .phase-lbl { font: 700 13px Arial, sans-serif; }
      .arrow     { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrowhead); }
      .arrow-sub { stroke: #9ca3af; stroke-width: 1.3; fill: none; marker-end: url(#arrowhead-sm); stroke-dasharray: 5 3; }
      .timeline  { stroke: #374151; stroke-width: 2.5; fill: none; }
      .divider   { stroke: #e5e7eb; stroke-width: 1.2; stroke-dasharray: 6 4; }
      .bracket-p { stroke: #047857; stroke-width: 2.2; fill: none; }
      .bracket-c { stroke: #c2410c; stroke-width: 2.2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#374151"/>
    </marker>
    <marker id="arrowhead-sm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#047857"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#c2410c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="640"/>

  <!-- Title -->
  <text class="title" x="60" y="52">TMS-EEG Skills Bundle — Lifecycle Routing Logic</text>
  <text class="subtitle" x="60" y="74">Queries are routed to the relevant sub-skill based on study stage</text>

  <!-- ── TIMELINE BACKBONE ── -->
  <!-- Main horizontal line -->
  <line class="timeline" x1="80" y1="160" x2="1140" y2="160" marker-end="url(#arrowhead)"/>

  <!-- Phase nodes on timeline -->
  <!-- Phase 1: Study Design -->
  <circle cx="200" cy="160" r="10" fill="#047857" stroke="#fff" stroke-width="2"/>
  <!-- Phase 2: Acquisition -->
  <circle cx="490" cy="160" r="10" fill="#0369a1" stroke="#fff" stroke-width="2"/>
  <!-- Phase 3: Preprocessing -->
  <circle cx="780" cy="160" r="10" fill="#c2410c" stroke="#fff" stroke-width="2"/>
  <!-- Phase 4: Analysis -->
  <circle cx="1060" cy="160" r="10" fill="#c2410c" stroke="#fff" stroke-width="2"/>

  <!-- Phase labels above timeline -->
  <text class="phase-lbl" x="200" y="135" text-anchor="middle" fill="#047857">Study Design</text>
  <text class="phase-lbl" x="490" y="135" text-anchor="middle" fill="#0369a1">Acquisition</text>
  <text class="phase-lbl" x="780" y="135" text-anchor="middle" fill="#c2410c">Preprocessing</text>
  <text class="phase-lbl" x="1060" y="135" text-anchor="middle" fill="#c2410c">Analysis</text>

  <!-- Vertical divider between Acquisition and Preprocessing -->
  <line class="divider" x1="635" y1="95" x2="635" y2="590"/>
  <text class="text-sm" x="635" y="112" text-anchor="middle" fill="#9ca3af">acquisition complete</text>

  <!-- ── BRACKETS BELOW TIMELINE ── -->
  <!-- Planner bracket: Study Design → Acquisition -->
  <path class="bracket-p" d="M120,175 L120,195 L555,195 L555,175"/>
  <text class="sublabel" x="337" y="215" text-anchor="middle" fill="#047857">Experiment Planner</text>

  <!-- Prep bracket: Preprocessing → Analysis -->
  <path class="bracket-c" d="M715,175 L715,195 L1110,195 L1110,175"/>
  <text class="sublabel" x="912" y="215" text-anchor="middle" fill="#c2410c">Preprocessing Consultant</text>

  <!-- ── PLANNER CARD ── -->
  <rect class="planner" x="60" y="240" width="530" height="300" rx="10"/>
  <text class="label-lg" x="325" y="272" text-anchor="middle" fill="#047857">Experiment Planner</text>
  <line x1="80" y1="282" x2="570" y2="282" stroke="#a7f3d0" stroke-width="1"/>

  <!-- Planner columns -->
  <!-- Col 1 -->
  <text class="sublabel" x="110" y="308">Target &amp; Coil</text>
  <text class="text" x="110" y="326">Target-specific risk</text>
  <text class="text" x="110" y="344">Coil orientation</text>
  <text class="text" x="110" y="362">E-field simulation</text>
  <text class="text" x="110" y="380">Neuronavigation</text>

  <text class="sublabel" x="110" y="410">Stimulation Dosing</text>
  <text class="text" x="110" y="428">%RMT vs E-field</text>
  <text class="text" x="110" y="446">TEP-threshold titration</text>
  <text class="text" x="110" y="464">RMT muscle choice</text>

  <!-- Col 2 -->
  <text class="sublabel" x="290" y="308">Controls &amp; Masking</text>
  <text class="text" x="290" y="326">Sham design</text>
  <text class="text" x="290" y="344">Click-noise masking</text>
  <text class="text" x="290" y="362">Sensory matching</text>
  <text class="text" x="290" y="380">Somatosensory controls</text>

  <text class="sublabel" x="290" y="410">Online QC</text>
  <text class="text" x="290" y="428">rt-TEP monitoring</text>
  <text class="text" x="290" y="446">Acquisition go/no-go</text>
  <text class="text" x="290" y="464">Channel prep &amp; impedance</text>

  <!-- Col 3 -->
  <text class="sublabel" x="460" y="308">Outputs</text>
  <text class="text" x="460" y="326">Session protocol</text>
  <text class="text" x="460" y="344">Session checklist</text>
  <text class="text" x="460" y="362">Preregistration text</text>
  <text class="text" x="460" y="380">Methods template</text>

  <!-- Warning box inside planner -->
  <rect class="warn-box" x="80" y="488" width="490" height="38" rx="6"/>
  <text class="text" x="325" y="503" text-anchor="middle" fill="#92400e">⚠  Preprocessing cannot substitute for acquisition decisions</text>
  <text class="text" x="325" y="519" text-anchor="middle" fill="#92400e">made at the planning stage</text>

  <!-- ── PREPROCESSING CARD ── -->
  <rect class="prep" x="610" y="240" width="530" height="300" rx="10"/>
  <text class="label-lg" x="875" y="272" text-anchor="middle" fill="#c2410c">Preprocessing Consultant</text>
  <line x1="630" y1="282" x2="1120" y2="282" stroke="#fed7aa" stroke-width="1"/>

  <!-- Prep columns -->
  <!-- Col 1 -->
  <text class="sublabel" x="650" y="308">Artifact Handling</text>
  <text class="text" x="650" y="326">Pulse artifact removal</text>
  <text class="text" x="650" y="344">Decay/baseline repair</text>
  <text class="text" x="650" y="362">Muscle artifact triage</text>
  <text class="text" x="650" y="380">Sensory confound flags</text>

  <text class="sublabel" x="650" y="410">Pipeline Selection</text>
  <text class="text" x="650" y="428">MNE-Python / TESA</text>
  <text class="text" x="650" y="446">ICA / SOUND / SSP-SIR</text>
  <text class="text" x="650" y="464">AARATEP / ARTIST</text>

  <!-- Col 2 -->
  <text class="sublabel" x="840" y="308">Outcome Measures</text>
  <text class="text" x="840" y="326">TEP components</text>
  <text class="text" x="840" y="344">GMFA / LMFP</text>
  <text class="text" x="840" y="362">i-TEP / early latencies</text>
  <text class="text" x="840" y="380">Spectral perturbations</text>

  <text class="sublabel" x="840" y="410">Code Generation</text>
  <text class="text" x="840" y="428">Python / MNE recipes</text>
  <text class="text" x="840" y="446">MATLAB / TESA recipes</text>
  <text class="text" x="840" y="464">QC report templates</text>

  <!-- Col 3 -->
  <text class="sublabel" x="1030" y="308">Outputs</text>
  <text class="text" x="1030" y="326">Runnable code</text>
  <text class="text" x="1030" y="344">Pipeline rationale</text>
  <text class="text" x="1030" y="362">QC checkpoints</text>
  <text class="text" x="1030" y="380">Source-grounded</text>
  <text class="text" x="1030" y="398">caveats</text>

  <!-- Warning box inside prep -->
  <rect class="warn-box" x="630" y="488" width="490" height="38" rx="6"/>
  <text class="text" x="875" y="503" text-anchor="middle" fill="#92400e">⚠  Artifact identification from description alone is unreliable —</text>
  <text class="text" x="875" y="519" text-anchor="middle" fill="#92400e">recommendations must be verified against raw data</text>

  <!-- ── SHARED KNOWLEDGE FOOTER ── -->
  <rect x="60" y="558" width="1080" height="52" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.3"/>
  <text class="sublabel" x="600" y="579" text-anchor="middle" fill="#3730a3">Shared Knowledge Base</text>
  <text class="text" x="600" y="598" text-anchor="middle" fill="#4338ca">Paper cards · Artifact cards · Pipeline cards · Recipe templates · Repository cards · Good-practice guidelines</text>
  <text class="text-sm" x="600" y="614" text-anchor="middle" fill="#6366f1">Community-extensible via pull requests · All cards versioned and source-grounded</text>

  <!-- Arrows from cards to shared base -->
  <line class="arrow-sub" x1="325" y1="540" x2="325" y2="558"/>
  <line class="arrow-sub" x1="875" y1="540" x2="875" y2="558"/>

</svg>
